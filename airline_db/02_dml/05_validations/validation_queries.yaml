databaseChangeLog:
  - changeSet:
      id: validation-001-fk-person-type
      author: tu_nombre
      changes:
        - sql:
            sql: |
              -- Validar relaciones FK
              SELECT COUNT(*) 
              FROM identity.person p
              WHERE p.person_type_id IS NULL;

  - changeSet:
      id: validation-002-duplicate-currency
      author: tu_nombre
      changes:
        - sql:
            sql: |
              -- Validar duplicados
              SELECT iso_currency_code, COUNT(*)
              FROM geography.currency
              GROUP BY iso_currency_code
              HAVING COUNT(*) > 1;

  - changeSet:
      id: validation-003-ticket-null
      author: tu_nombre
      changes:
        - sql:
            sql: |
              -- Validar datos obligatorios
              SELECT * 
              FROM commercial.ticket
              WHERE ticket_number IS NULL;

  - changeSet:
      id: validation-004-invoice-dates
      author: tu_nombre
      changes:
        - sql:
            sql: |
              -- Validar integridad de fechas
              SELECT * 
              FROM billing.invoice
              WHERE due_at < issued_at;

  - changeSet:
      id: validation-005-airport-address
      author: tu_nombre
      changes:
        - sql:
            sql: |
              -- Validar dependencias
              SELECT * 
              FROM airport.airport a
              LEFT JOIN geography.address ad 
                ON a.address_id = ad.address_id
              WHERE ad.address_id IS NULL;