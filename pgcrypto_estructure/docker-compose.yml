name: shopping-cart-db

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopping_cart}
      POSTGRES_USER: ${POSTGRES_USER:-shopping_cart_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopping_cart_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-shopping_cart_user} -d ${POSTGRES_DB:-shopping_cart}
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    build:
      context: .
      dockerfile: docker/liquibase/Dockerfile
    image: shopping-cart-liquibase:5.0.2
    profiles:
      - tooling
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    entrypoint:
      - liquibase
      - --search-path=/workspace
      - --changeLogFile=changelog-master.yaml
      - --classpath=/liquibase/liquibase_libs/postgresql-42.7.8.jar
      - --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-shopping_cart}
      - --username=${POSTGRES_USER:-shopping_cart_user}
      - --password=${POSTGRES_PASSWORD:-shopping_cart_password}

volumes:
  postgres_data:
